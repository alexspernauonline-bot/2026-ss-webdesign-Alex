<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bauhaus Poster Beispiel 1</title>
    <link rel="stylesheet" href="bauhaus01.css">
</head>
<body>

    <div class="poster">
        <div class="art-grid">
            
            <div class="shape red rnd-top"></div>
            <div class="shape red rnd-top"></div>
            
            <div class="shape blue leaf"></div>
            <div class="shape red leaf"></div>

            <div class="shape black semi-top"></div>
            <div class="shape black semi-top"></div>
            <div class="shape red leaf"></div>
            <div class="shape blue leaf"></div>

            <div class="shape blue semi-bottom"></div>
            <div class="shape blue semi-bottom"></div>
            <div class="shape blue leaf"></div>
            <div class="shape red leaf"></div>

            <div class="shape blue semi-top"></div>
            <div class="shape blue semi-top"></div>
            <div class="shape blue leaf"></div>
            <div class="shape blue leaf"></div>

            <div class="yellow-flower-container">
                <div class="flower-petal yellow"></div>
                <div class="flower-petal yellow"></div>
                <div class="flower-petal yellow"></div>
                <div class="flower-petal yellow"></div>
            </div>

            <div class="red-circles-container">
                <div class="shape red circle"></div>
                <div class="shape red circle"></div>
                <div class="shape red circle"></div>
                <div class="shape red circle"></div>
            </div>

            <div class="small-dots-container">
                <div class="dot blue"></div>
                <div class="dot blue"></div>
                <div class="dot blue"></div>
                <div class="dot blue"></div>
            </div>

            <div class="black-bottom-container">
                <div class="shape black semi-bottom"></div>
                <div class="shape black semi-bottom"></div>
            </div>
        </div>

        <div class="typography">
            <h1>BAUHAUS</h1>
            <p>ART AND (WEB)DESIGN</p>
        </div>
    </div>

</body>
</html>

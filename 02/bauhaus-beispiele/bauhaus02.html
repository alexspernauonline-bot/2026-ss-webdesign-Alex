<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>BauhausPoster Beispiel 2</title>
    <link rel="stylesheet" href="bauhaus02.css">
</head>
<body>

    <div class="poster">
        <div class="grid-overlay">
            <div class="h-line" style="top: 16.66%;"></div>
            <div class="h-line" style="top: 33.33%;"></div>
            <div class="h-line" style="top: 50%;"></div>
            <div class="h-line" style="top: 66.66%;"></div>
            <div class="h-line" style="top: 83.33%;"></div>
            <div class="v-line" style="left: 14.28%;"></div>
            <div class="v-line" style="left: 28.57%;"></div>
            <div class="v-line" style="left: 42.85%;"></div>
            <div class="v-line" style="left: 57.14%;"></div>
            <div class="v-line" style="left: 71.42%;"></div>
            <div class="v-line" style="left: 85.71%;"></div>
        </div>

        <div class="color-rect red" style="left: 7%; top: 22%; width: 28%; height: 55%;"></div>
        <div class="color-rect red" style="left: 48%; top: 14%; width: 31%; height: 28%;"></div>
        
        <div class="color-rect blue" style="left: 33%; top: 8%; width: 14%; height: 38%;"></div>
        <div class="color-rect blue" style="left: 48%; top: 28%; width: 14%; height: 66%;"></div>
        <div class="color-rect blue" style="left: 82%; top: 54%; width: 18%; height: 20%;"></div>

        <div class="color-rect yellow" style="left: 20%; top: 0%; width: 14%; height: 22%;"></div>
        <div class="color-rect yellow" style="left: 64%; top: 6%; width: 28%; height: 38%;"></div>
        <div class="color-rect yellow" style="left: 20%; top: 66%; width: 28%; height: 28%;"></div>

        <div class="text-grid">
            <div class="letter-box" style="grid-column: 2;">B</div>
            <div class="letter-box" style="grid-column: 3;">A</div>
            <div class="letter-box" style="grid-column: 4;">U</div>
            <div class="letter-box" style="grid-column: 5;">H</div>
            <div class="letter-box" style="grid-column: 6;">A</div>
            <div class="letter-box" style="grid-column: 7;">U</div>
            <div class="letter-box" style="grid-column: 8;">S</div>

            <div class="letter-box" style="grid-column: 3; grid-row: 2;">H</div>
            <div class="letter-box" style="grid-column: 4; grid-row: 2;">S</div>
            <div class="letter-box" style="grid-column: 5; grid-row: 2;">A</div>
            <div class="letter-box" style="grid-column: 6; grid-row: 2;">V</div>
            <div class="letter-box" style="grid-column: 7; grid-row: 2;">I</div>
            <div class="letter-box" style="grid-column: 8; grid-row: 2;">S</div>
        </div>
    </div>

</body>
</html>

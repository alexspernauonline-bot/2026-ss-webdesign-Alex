<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bauhaus Style</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #ff5722;
            text-align: center;
        }
        .box {
            width: 100px;
            height: 100px;
            margin: 10px;
            background-color: #3f51b5;
            float: left;
            transition: transform 0.3s, background-color 0.3s;
        }
        .box:hover {
            transform: scale(1.1);
            background-color: #673ab7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bauhaus Design</h1>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
